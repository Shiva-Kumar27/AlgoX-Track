<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — AlgoX Track</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-wrap { width: 100%; max-width: 440px; padding: 24px; }
        .auth-logo {
            font-size: 13px; font-weight: 700; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--text-muted);
            font-family: 'Roboto', sans-serif; margin-bottom: 40px; text-align: center;
        }
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }
        .auth-title {
            font-size: 26px; font-weight: 800; letter-spacing: -0.02em;
            color: var(--text-primary); margin-bottom: 6px;
        }
        .auth-subtitle {
            font-size: 12px; color: var(--text-muted);
            font-family: 'Roboto', sans-serif; margin-bottom: 32px;
        }
        .auth-form { display: flex; flex-direction: column; gap: 18px; }
        .auth-error {
            background: rgba(239,83,80,0.1);
            border: 1px solid rgba(239,83,80,0.3);
            color: #EF5350;
            padding: 10px 14px; border-radius: var(--radius-sm);
            font-size: 13px; font-family: 'Roboto', sans-serif;
        }
        .auth-footer {
            text-align: center; margin-top: 24px; font-size: 12px;
            color: var(--text-muted); font-family: 'Roboto', sans-serif;
        }
        .auth-footer a { color: var(--text-secondary); text-decoration: none; }
        .auth-footer a:hover { color: var(--text-primary); }
        .btn-auth {
            background: var(--text-primary); color: var(--bg-deep); padding: 13px;
            border-radius: var(--radius-xl); border: none; font-size: 13px; font-weight: 700;
            cursor: pointer; font-family: 'Syne', sans-serif; letter-spacing: 0.04em;
            transition: background var(--transition), transform var(--transition); width: 100%;
        }
        .btn-auth:hover { background: var(--accent); transform: scale(0.99); }
        .hint {
            font-size: 10px; color: var(--text-muted); margin-top: 4px;
            font-family: 'Roboto', sans-serif;
        }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-logo">AlgoX Track</div>
        <div class="auth-card">
            <div class="auth-title">Create account</div>
            <div class="auth-subtitle">// start tracking your progress</div>

            {% if error %}
            <div class="auth-error" style="margin-bottom:16px">{{ error }}</div>
            {% endif %}

            <form method="POST" class="auth-form" id="reg-form">
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" name="username" id="reg-username"
                           placeholder="e.g. algo_wizard" required autofocus minlength="3">
                    <span class="hint">min. 3 characters, must be unique</span>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@example.com" autocomplete="email">
                    <span class="hint">optional</span>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" name="password" id="reg-password"
                           placeholder="••••••••" required minlength="6" autocomplete="new-password">
                    <span class="hint">min. 6 characters</span>
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" name="confirm_password" id="reg-confirm"
                           placeholder="••••••••" required autocomplete="new-password">
                    <div class="error-message" id="pw-match-error">Passwords do not match.</div>
                </div>
                <button type="submit" class="btn-auth">Create Account</button>
            </form>
        </div>
        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </div>
    </div>

    <script>
        document.getElementById('reg-form').addEventListener('submit', function(e) {
            const pw = document.getElementById('reg-password').value;
            const cf = document.getElementById('reg-confirm').value;
            const errEl = document.getElementById('pw-match-error');
            const group = document.getElementById('reg-confirm').closest('.form-group');
            if (pw !== cf) {
                e.preventDefault();
                group.classList.add('error');
                errEl.style.display = 'block';
            } else {
                group.classList.remove('error');
                errEl.style.display = 'none';
            }
        });
        document.getElementById('reg-confirm').addEventListener('input', function() {
            const pw = document.getElementById('reg-password').value;
            const group = this.closest('.form-group');
            const errEl = document.getElementById('pw-match-error');
            if (this.value && this.value !== pw) {
                group.classList.add('error');
                errEl.style.display = 'block';
            } else {
                group.classList.remove('error');
                errEl.style.display = 'none';
            }
        });
    </script>
</body>
</html>
